# Event hooks for server-side automation.
# Placeholders: {player_name}, {player}, {player_uuid}, {player_level}, {old_prestige_level},
# {new_prestige_level}, {prestige_level}, {old_player_level}, {new_player_level}, {level}

events:
  prestige_level_up:
    enabled: true
    # false = console sender, true = player sender.
    as_player: false
    # "*" = every prestige level; "[1,2,3]" = specific prestige levels.
    commands:
      "*":
        - "say {player_name} reached prestige {new_prestige_level}!"

  player_level_up:
    enabled: true
    # false = console sender, true = player sender.
    as_player: false
    # Default for mapped command groups: true = repeat every prestige cycle, false = prestige 0 only.
    repeat_access_prestiges: true
    # "*/10" = every 10 levels; "[10,20,30]" = specific levels.
    # Use prestige_levels inside a rule to restrict it to specific prestiges.
    commands:
      "*/10":
        repeat_access_prestiges: true
        commands:
          - "say {player_name} reached level {level}!"
      "[10]":
        repeat_access_prestiges: false
        commands:
          - "give {player_name} Armor_Copper_Head 1"
          - "give {player_name} Armor_Copper_Chest 1"
          - "give {player_name} Armor_Copper_Hands 1"
          - "give {player_name} Armor_Copper_Legs 1"
          - "give {player_name} Weapon_Sword_Copper 1"

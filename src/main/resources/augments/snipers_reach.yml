id: snipers_reach
name: "Sniper's Reach"
tier: MYTHIC
description: "Ranged damage scales with distance, peaking at long range."
category: ON_RANGED_HIT
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Ranged damage scales with distance, peaking at long range."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  bonus_damage_by_distance:
    max_value: 1.5 # 150% bonus damage at max distance
    min_distance: 5 # minimum effective range in blocks
    max_distance: 30 # maximum effective range in blocks
    scaling_type: linear # scales linearly from 0 to max
    attack_type: RANGED # only applies to ranged attacks

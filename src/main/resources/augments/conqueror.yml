id: conqueror
name: "Conqueror"
tier: MYTHIC
description: "Sustained combat builds momentum, increasing your damage. At full stacks your attacks pierce defenses with true damage."
category: ON_HIT
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Sustained combat builds momentum, increasing your damage. At full stacks your attacks pierce defenses with true damage."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  buffs:
    bonus_damage:
      value: 0.05 # +5% bonus damage per stack
    max_stacks: 8

  max_stack_bonus:
    bonus_true_damage:
      value: 25.0 # Flat true damage added to each hit
      true_damage_percent: 0.15 # +15% of damage dealt is added as bonus true damage at max stacks

  duration:
    seconds: 8 # Seconds after hitting a target to maintain stacks, refreshing on each hit

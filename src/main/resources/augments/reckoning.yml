id: reckoning
name: "Reckoning"
tier: MYTHIC
description: "Your attack damage is enhanced at the cost of your health."
category: ON_HIT
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Your attack damage is enhanced at the cost of your health."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  bonus_damage:
    scaling_stat: missing_health_percent # scales with missing HP
    max_bonus_damage: 1 # up to 100% bonus damage at full missing HP
    full_value_at_health_percent: 0.25 # full bonus damage when player health is at or below 25%

  self_damage:
    percent_of_current_hp: 0.05 # loses 5% of current HP per hit


id: phantom_hits
name: "Phantom Hits"
tier: ELITE
description: "Your attacks fire additional phantom strikes that scale with both Strength and Sorcery."
category: ON_HIT
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Your attacks fire additional phantom strikes that scale with both Strength and Sorcery."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  phantom_damage:
    flat_damage: 20 # base additional damage
    strength_scaling: 0.10 # +10% of Strength added to damage
    sorcery_scaling: 0.10 # +10% of Sorcery added to damage
    can_crit: true # phantom damage can critically strike

id: executioner
name: "Executioner"
tier: ELITE
description: "Executes low-health targets with a heavy strike on a cooldown."
category: ON_HIT
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Executes low-health targets with a heavy strike on a cooldown."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  bonus_damage_on_hit:
    value: 2.50 # +300% damage to targets below the threshold
    threshold: 0.15 # Applies when target is below 20% HP or this hit drops them to/below 20%
    cooldown: 45 # Seconds between executioner procs

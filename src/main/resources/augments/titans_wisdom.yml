id: titans_wisdom
name: "Titan's Wisdom"
tier: ELITE
description: "Gain Sorcery based on your total max Health, but lose some Haste."
category: PASSIVE_STAT
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Gain Sorcery based on your total max Health, but lose some Haste."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  buffs:
    sorcery_from_max_health:
      scaling_stat: max_health
      conversion_percent: 0.15 # gain Sorcery equal to 15% of your max health
  debuffs:
    haste:
      value: -0.15 # -15% Haste

id: absolute_focus
name: "Absolute Focus"
tier: ELITE
description: "Periodically guarantee a critical strike. Excess critical chance is converted into bonus damage."
category: PASSIVE_STAT
enabled: true

ui:
  sections:
    - title: "Core Effect"
      body: "Periodically guarantees your next attack is a critical strike."
      color: "#8adf9e"
    - title: "Scaling"
      body: "Any critical chance above 100% is converted into bonus damage."
      color: "#9ecbff"
    - title: "Timing"
      body: "Activates once every 8 seconds."
      color: "#ffd56b"

passives:
  guaranteed_crit:
    cooldown: 8 # every 8 seconds
    crit_chance: 1.0 # next attack has 100% critical chance

  excess_crit_conversion:
    stat: crit_chance
    conversion_ratio: 1.0 # 1% excess crit converts to 1% bonus damage

id: titans_might
name: "Titan's Might"
tier: ELITE
description: "Gain Strength based on your total max Health, but lose some Haste."
category: PASSIVE_STAT
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Gain Strength based on your total max Health, but lose some Haste."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  buffs:
    strength_from_max_health:
      value: 0.15 # 15% of total max Health added as Strength
      scaling_stat: MAX_HEALTH # scales based on total max HP
  debuffs:
    haste:
      value: -0.15 # -15% Haste

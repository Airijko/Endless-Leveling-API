id: phase_rush
name: "Phase Rush"
tier: MYTHIC
description: "Rapid attacks accelerate your combat tempo and convert speed into power."
category: ON_HIT
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Rapid attacks accelerate your combat tempo and convert speed into power."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  buffs:
    haste:
      value: 0.50 # +50% base haste

  hit_counter:
    hits_required: 5
    duration: 5 # seconds to complete the hit counter before it resets

  haste_burst:
    multiplier: 2.0 # double haste
    duration: 3 # seconds

  haste_to_damage_conversion:
    conversion_percent: 0.50 # 50% of haste becomes bonus damage

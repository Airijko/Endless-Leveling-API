id: fortress
name: "Fortress"
tier: ELITE
description: "At the brink of death you gain a brief shielded immobile phase, then a follow-up window of protection and empowered stats."
category: ON_LOW_HP
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "At the brink of death you gain a brief shielded immobile phase, then a follow-up window of protection and empowered stats."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  shield_phase:
    min_health_hp: 1 # flat HP trigger/floor
    duration: 5 # lasts 5 seconds
    cooldown: 100 # second cooldown

  buff_phase:
    duration: 15 # lasts 15 seconds
    buffs:
      defense:
        value: 0.15 # 15% damage reduction
      strength:
        value: 0.50 # +50% Strength
      sorcery:
        value: 0.50 # +50% Sorcery

id: predator
name: "Predator"
tier: ELITE
description: "Killing an enemy grants 12% Haste and 6% Strength for 10 seconds (Stacks up to 4 times). You lose 10% Defense until maximum stacks are reached."
category: ON_KILL

passives:
  buffs:
    haste:
      value_percent: 0.12 # +12% Haste per stack
      max_stacks: 4
      duration: 10 # seconds
    strength:
      value_percent: 0.06 # +6% Strength per stack
      max_stacks: 4
      duration: 10 # seconds
  debuffs:
    defense:
      value_percent: -0.10 # -10% Defense
      active_until_max_stacks: true # penalty removed when max stacks reached

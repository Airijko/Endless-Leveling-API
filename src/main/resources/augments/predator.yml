id: predator
name: "Predator"
tier: ELITE
description: "Kills grant stacking Haste and Strength while a Defense penalty persists until fully stacked."
category: ON_KILL
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Kills grant stacking Haste and Strength while a Defense penalty persists until fully stacked."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  buffs:
    haste:
      value: 0.12 # +12% Haste per stack
    strength:
      value: 0.06 # +6% Strength per stack
    max_stacks: 4

  duration:
    seconds: 10 # stack duration; refreshed on each kill

  debuffs:
    defense:
      value: -0.10 # -10% Defense
      active_until_max_stacks: true # penalty removed when max stacks reached

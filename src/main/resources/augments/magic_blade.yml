id: magic_blade
name: "Magic Blade"
tier: ELITE
description: "Your magical power empowers your weapons, converting Sorcery into weapon damage and empowering swords."
category: PASSIVE_STAT
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Your magical power empowers your weapons, converting Sorcery into weapon damage and empowering swords."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  sorcery_weapon_conversion:
    stat: sorcery
    conversion_percent: 0.75 # 75% of total Sorcery now applies to all weapon damage

  weapon_bonus:
    weapon_type: sword # sword-based classes
    bonus_damage: 0.20 # +20% bonus damage when using swords

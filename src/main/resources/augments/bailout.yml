id: bailout
name: "Bailout"
tier: ELITE
description: "Cheat death briefly and rapidly decay unless you secure a kill."
category: ON_DEATH
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Cheat death briefly and rapidly decay unless you secure a kill."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  death_prevention:
    cooldown: 45 # seconds
    revive_health_percent: 0.75 # heal 75% of max health on trigger

  health_decay:
    drains_to_zero: true
    drain_max_hp_percent_per_second: 0.25 # lose 25% max HP/s; if no kill, death is forced after the expected drain window
    cancel_on_kill: true # killing a target stops the decay

  emergency_heal:
    missing_health_percent: 0.25 # heal 25% of missing health

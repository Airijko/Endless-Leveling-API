id: mana_infusion
name: "Mana Infusion"
tier: ELITE
description: "Gain bonus Sorcery equal to a portion of your current Mana."
category: MAGIC_STAT
enabled: true


weights:
  default: 5
  conditions:
    - when:
        min_skill_levels:
          sorcery: 100
      weight: 65
    - when:
        max_skill_levels:
          sorcery: 50
      weight: 1

ui:
  sections:
    - title: "Buffs"
      body: "+20% Sorcery based on current Mana"
      color: "#8adf9e"
    - title: "Rules"
      body: "Scaling Stat: MANA"
      color: "#ffb86b"
passives:
  buffs:
    sorcery_from_mana:
      value: 0.2 # 20% of current Mana is added as Sorcery
      scaling_stat: MANA # scales based on current Mana


id: arcane_instability
name: "Arcane Instability"
tier: ELITE
description: "Gain Sorcery while high on Mana and suffer a Sorcery penalty when Mana is low."
category: MAGIC_STAT
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Gain Sorcery while high on Mana and suffer a Sorcery penalty when Mana is low."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  buffs:
    sorcery_bonus_high:
      value: 0.40 # +40% Sorcery
      condition:
        resource: MANA
        min_percent: 0.75 # active above 75% Mana

  debuffs:
    sorcery_penalty_low:
      value: -0.25 # -25% Sorcery
      condition:
        resource: MANA
        max_percent: 0.25 # active below 25% Mana

id: giant_slayer
name: "Giant Slayer"
tier: MYTHIC
description: "Deal more damage to enemies with higher health than you, scaling with the health gap."
category: ON_HIT
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Deal more damage to enemies with higher health than you, scaling with the health gap."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  bonus_damage_vs_hp_ratio:
    max_value: 1.8 # 180% max bonus damage
    scaling_stat: TARGET_CURRENT_HP
    reference_stat: PLAYER_CURRENT_HP
    max_ratio: 8.0 # max bonus when target has 8x your HP
    calculation: "linear" # scales linearly between equal HP and max_ratio

id: overdrive
name: "Overdrive"
tier: ELITE
description: "Build Haste and Critical Damage with consecutive hits; lose momentum when you take damage."
category: ON_HIT
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Build Haste and Critical Damage with consecutive hits; lose momentum when you take damage."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  buffs:
    haste:
      value: 0.04 # +4% Haste per stack
    crit_damage:
      value: 0.05 # +5% Critical Damage per stack
    max_stacks: 8

  duration:
    seconds: 8 # stack duration; refreshed on each hit

  stack_loss_conditions:
    on_miss: true # lose a stack when an attack misses
    on_damage_taken: true # lose a stack when taking damage

id: overheal
name: "Overheal"
tier: ELITE
description: "Any healing beyond max health is stored as a temporary decaying shield. Also grants Life Steal."
category: ON_HIT
enabled: true

ui:
  sections:
    - title: "Overview"
      body: "Any healing beyond max health is stored as a temporary decaying shield. Also grants Life Steal."
      color: "#8adf9e"
    - title: "Effects"
      body: "Review the sections below for exact buff, debuff, duration, and cooldown details."
      color: "#9ecbff"
    - title: "Build Tip"
      body: "Pair this augment with stats and passives that amplify its strongest scaling."
      color: "#ffd56b"

passives:
  overheal_shield:
    max_shield_percent: 0.15 # store up to 15% of max health as overheal shield
    decay_duration: 8 # shield value decays over 8 seconds

  buffs:
    lifesteal:
      value: 0.05 # +5% Life Steal

    body: 'AoE Damage: (10% Strength) + (50% Precision) + (20% Ferocity)

      Radius: 3 blocks

      '
    color: '#8adf9e'
  - title: Rules
    body: 'Attack Type: RANGED

      Min Distance: 10 blocks

      Cooldown: 5s

      '
    color: '#ffb86b'
passives:
  missile_shot:
    strength_scaling: 0.10
    precision_scaling: 0.50
    ferocity_scaling: 0.20
    radius: 3.0
    min_distance: 10.0
    cooldown: 5.0
mob_compatible: true

# Per-world mob leveling overrides.
#
# World ids are matched case-insensitively.
# Example wildcard pattern:
#   instance-mj_instance_d01-*

World_Overrides:
  # Global fallback pattern example (optional)
  # "*":
  #   Level_Source:
  #     Mode: "MIXED"

  # Static world exact match
  default:
    Enabled: true
    allow_passive_mob_leveling: false
    Blacklist_Mob_Types:
      ids: []
      keywords:
        [
          "Citizen",
          "Antelope",
          "Bat",
          "Jackalope",
          "Camel",
          "Cat",
          "Catfish",
          "Cattle",
          "Chicken",
          "Clownfish",
          "Crab",
          "Crow",
          "Deer",
          "Dog",
          "Duck",
          "Feran",
          "Flamingo",
          "Fox",
          "Frog",
          "Horse",
          "Human",
          "Klop",
          "Lobster",
          "Macaque",
          "Meerkat",
          "Moose",
          "Mouse",
          "Owl",
          "Parrot",
          "Penguin",
          "Pigeon",
          "Pike",
          "Pufferfish",
          "Rainbow_Trout",
          "Ram",
          "Regal_Tang",
          "Cow",
          "Snail",
          "Snake",
          "Sparrow",
          "Vulture",
          "Woodpecker",
          "Sheep",
          "Gecko",
          "Chick",
          "Pig",
          "Rabbit",
          "Turtle",
          "Goat",
          "Squirrel",
          "Raccoon",
          "Badger",
          "Lamb",
          "Camel",
          "Bird",
          "Bluebird",
          "Finch_Green",
          "Owl_Brown",
          "Owl_Snow",
          "Raven",
          "Archaeopteryx",
          "Hawk",
          "Pterodactyl",
          "Fish",
          "Bluegill",
          "Frostgill",
          "Minnow",
          "Piranha_Black",
          "Piranha",
          "Snapjaw",
          "Trout_Rainbow",
          "Eel_Moray",
          "Shark_Hammerhead",
          "Shellfish_Lava",
          "Trilobite*",
          "Whale_Humpback",
          "Jellyfish*",
          "Tang",
          "Tang*",
          "Eel",
          "Salmon",
          "Foal",
          "Stag",
          "Merchant",
          "Trader",
          "Frog*",
        ]
    Level_Range:
      Min: 1
      Max: 200
    Level_Source:
      Mode: "MIXED"
      Distance_Level:
        Start_Level: 1
        Blocks_Per_Level: 100
        Max_Level: 200
        Min_Level: 1
        Center_Coordinates: "SPAWN"
      Mixed:
        Player_Weight: 0.5
      Fixed_Level:
        # Supports either a flat level or a random range:
        # Level: 50
        # Level: "50-65"
        # Min: 50
        # Max: 65
        Level: 10
      Tiers:
        # Used when Mode: "TIERS"
        # Preferred tier base range key: Base_Level (Fixed_Level still works as fallback).
        Total_Tiers: 1
        Levels_Per_Tier: 25
        Player_Adaptation:
          Enabled: true
          # Promotes to the next tier when player level is this many levels below that tier's min.
          Below_Range_Allowance: 0
      Player_Based:
        Offset: 0
        Min_Difference: -5
        Max_Difference: 10
        # Player mode specific tuning.
        Influence_Radius: 25
      Party_System:
        Enabled: true
        Level_Calculation: "AVERAGE"
        Dominant_Party_Resolution:
          Mode: "MOST_MEMBERS"
        Max_Internal_Level_Gap: 999
    Scaling:
      Health:
        Enabled: true
        Base_Multiplier: 1.0
        Per_Level: 0.075
      Damage:
        Enabled: true
        Base_Multiplier: 1.0
        Per_Level: 0.05
      Defense:
        Enabled: true
        At_Negative_Max_Difference: 0.0
        At_Positive_Max_Difference: 0.8
        Below_Negative_Max_Difference: 0.0
        Above_Positive_Max_Difference: 0.9

  # MAJOR DUNGEONS
  instance-mj_instance_d01-*:
    Level_Source:
      Mode: "TIERS"
      Base_Level:
        Level: 25-40
      Tiers:
        Total_Tiers: 4
        Levels_Per_Tier: 25
        Player_Adaptation:
          Enabled: true
          Below_Range_Allowance: 5
      Party_System:
        Enabled: true
        Level_Calculation: "AVERAGE"
        Max_Internal_Level_Gap: 999
    Scaling:
      Health:
        Base_Multiplier: 3.0
        Per_Level: 0.075
      Damage:
        Base_Multiplier: 1.25
        Per_Level: 0.05
      Defense:
        At_Negative_Max_Difference: 0.2
        At_Positive_Max_Difference: 0.8
        Below_Negative_Max_Difference: 0.0
        Above_Positive_Max_Difference: 0.9
    Mob_Overrides:

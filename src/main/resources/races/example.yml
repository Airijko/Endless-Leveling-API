# ============================================================================
# Race Config Cheat Sheet
# ----------------------------------------------------------------------------
# Metadata
#   race_name        -> Display name for UI and logs.
#   description      -> Short flavor text shown on selection screens.
#   enabled          -> Set to true
# Base Attributes (always-on stats granted by the race)
#   life_force       -> Flat HP baseline before player-earned attributes.
#   strength         -> Base multiplier applied to skill-derived damage bonuses (1.0 = normal).
#   defense          -> Base multiplier applied to skill-derived defense values before curves (1.0 = normal).
#   haste            -> Baseline movement multiplier that multiplies the skill haste bonus (1.0 = normal).
#   precision        -> Base crit chance (use percent values, e.g., 10 = 10%).
#   ferocity         -> Base crit damage bonus (50 = +50%).
#   stamina          -> Flat stamina pool.
#   intelligence     -> Flat mana/intelligence pool.
# ----------------------------------------------------------------------------
# Passive Reference (declare under `passives:` using `- type: <PASSIVE>`)

#   XP_BONUS
#     -> `value`: decimal percent bonus XP gained (1.0 = +100% XP)

#   INCREASED_HEALTH_REGEN
#     -> `value`: flat HP regenerated per 5 seconds (e.g., 2.5 = +2.5 HP every 5s)

#   INCREASED_MANA_REGEN
#     -> `value`: flat mana regenerated per 5 seconds

#   HEALING_BONUS
#     -> `value`: decimal percent bonus to healing done and received

#   SPECIAL_CHARGE_BONUS
#     -> `value`: decimal percent faster special-charge gain

#   LAST_STAND
#     -> `value`: decimal percent health healed when below a health threshold
#     -> `threshold`: player health percent to trigger effect
#     -> `duration`: seconds the restoration is spread over
#     -> `cooldown`: seconds between triggers

#   FIRST_STRIKE
#     -> `value`: decimal percent extra damage on the first hit per target
#     -> `cooldown`: seconds between procs

#   ADRENALINE
#     -> `value`: decimal percent of max stamina restored when below a stamina threshold
#     -> `threshold`: player stamina percent to trigger effect
#     -> `duration`: seconds the restoration is spread over
#     -> `cooldown`: seconds between triggers

#   BERZERKER
#     -> `value`: decimal percent damage increase at low health
#     -> `threshold`: player health percent to activate bonus (e.g., 0.3 = below 30% HP)

#   RETALIATION
#     -> `value`: decimal percent of damage taken that is reflected after the window expires
#     -> `window`: damage accumulation period in seconds
#     -> `cooldown`: seconds between activations

#   EXECUTIONER
#     -> `value`: decimal percent of execution damage threshold (e.g., 0.3 = execute targets when fatal damage takes them 30% HP or below)
#     -> `threshold`: target health percent (e.g., 0.3 = below 30% HP)

#   SWIFTNESS
#     -> `value`: decimal percent bonus applied to the final movement speed after haste (e.g., 0.05 = +5%)

#   INNATE_ATTRIBUTE_GAIN
#     -> `attribute`: which attribute gains bonus
#     -> `value`: flat amount granted per player level (use the same units as skill_attributes)
#     Valid attribute keys: life_force, strength, defense, haste, precision, ferocity, stamina, intelligence

# ============================================================================

race_name: "Example"
description: "PEEPEE POOPOO"
enabled: true

attributes: # Base Values
  life_force: 100.0
  strength: 1.0
  defense: 1.0
  haste: 1.0
  precision: 10.0
  ferocity: 50.0
  stamina: 10.0
  intelligence: 20.0

passives:
  - type: XP_BONUS
    value: 1.0 # +100% XP gain
  - type: INCREASED_HEALTH_REGEN
    value: 2.5 # +2.5 HP every 5 seconds
  - type: INCREASED_MANA_REGEN
    value: 1.25 # +1.25 mana every 5 seconds
  - type: HEALING_BONUS
    value: 0.2 # +20% healing dealt/received
  - type: SPECIAL_CHARGE_BONUS
    value: 1.0 # +100% faster special charge
  - type: LAST_STAND
    value: 0.5 # Heal 50% of max HP
    threshold: 0.2 # Trigger when below 20% HP
    duration: 10 # Lasts for 10 seconds
    cooldown: 60 # seconds between triggers
  - type: FIRST_STRIKE
    value: 1.0 # +100% damage on first hit
    cooldown: 20 # seconds between first-strike windows
  - type: ADRENALINE
    value: 0.25 # Restore 25% of max stamina when drained
    threshold: 0.3 # Trigger below 30% stamina
    duration: 5 # Spread recovery over 5 seconds
    cooldown: 45 # Seconds between adrenaline bursts
  - type: BERZERKER
    value: 0.2 # +20% damage when hurt
    threshold: 0.35 # Activates below 35% HP
  - type: RETALIATION
    value: 0.35 # Reflect 35% of damage taken in the window
    window: 4 # Collect damage for 4 seconds before retaliating
    cooldown: 25 # Seconds between retaliations
  - type: EXECUTIONER
    value: 0.25 # Execute targets when fatal blow would leave them at 25% HP
    threshold: 0.25 # Only applies to targets already below 25% HP
  - type: SWIFTNESS
    value: 0.08 # Passive +8% movement speed applied after haste
  - type: INNATE_ATTRIBUTE_GAIN
    attribute: strength
    value: 1 # +1 strength value per player level (same as spending 1 point each level)

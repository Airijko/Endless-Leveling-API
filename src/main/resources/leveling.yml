# Leveling formula used to calculate XP required for the next level.
# xpForNextLevel = base * ((log(level) + 1) * sqrt(level)) ^ exponent
# Prestige increases the effective base by base_xp_increase_per_prestige per prestige level.
default:
  expression: "base * ((log(level)+1) * sqrt(level))^1.8"
  # LOG10 (default) or LN
  log_mode: LOG10
  base: 100
  # Max XP a player can gain from a single kill.
  # xpGainCap = xp_gain_cap_base + xp_gain_cap_per_level * max(0, level - xp_gain_cap_threshold)
  xp_gain_cap_enabled: true
  xp_gain_cap_base: 40000
  xp_gain_cap_per_level: 520
  xp_gain_cap_threshold: 100
  # Level 100 - 40,000 MAX XP GAIN
  # Level 150 - 66,000 MAX XP GAIN
  # Level 200 - 92,000 MAX XP GAIN
  # Level 300 - 144,000 MAX XP GAIN
  # Level 600 - 300,000 MAX XP GAIN

# If you change these values, resync player skill points with "/el resetskillpointsall".
baseSkillPoints: 12
skillPointsPerLevel: 5

player_level_cap: 100

# Death XP penalty: on player death, subtract a percentage of current XP + a percentage of max XP for the level.
# penalty = (current_xp_percent / 100) * currentXp + (max_xp_percent / 100) * xpForNextLevel
# Player cannot lose a level or prestige from this — XP is clamped at 0.
death_xp_penalty:
  enabled: true
  current_xp_percent: 12.5
  max_xp_percent: 2.5

# Party XP sharing (simple shared model).
# - Killer always receives 100% of kill XP (solo logic/bonuses still apply).
# - Each in-range party member receives this percentage of the killer's base kill XP.
party_xp_share:
  enabled: true
  range: 25
  member_share_percent: 50

# Optional cap controls for class innate attribute gains.
# These caps apply to class INNATE_ATTRIBUTE_GAIN scaling only.
# - default: fallback cap for attributes not explicitly listed.
# - Use ENDLESS / NONE / UNLIMITED / UNCAPPED / -1 / 0 to disable cap for an attribute. (same crap)
classes:
  innate_attribute_gain_level_caps:
    default: 100
    life_force: ENDLESS

# Augment unlock milestones earned from normal player levels.
# Only for prestige 0; prestige milestones are configured separately under prestige.
# Each entry supports either explicit levels or progressive level milestones:
# - Explicit: levels: [10, 25, 50]
# - Progressive: required_player_level + level_interval (+ optional max_unlocks; -1 = unlimited)
augments:
  unlocks:
    - tier: COMMON
      levels: [5, 15, 35, 45]
    - tier: COMMON
      required_player_level: 10
      level_interval: 10
      max_unlocks: -1
    - tier: ELITE
      levels: [15]
    - tier: LEGENDARY
      levels: [30]
    - tier: MYTHIC
      levels: [50]

prestige:
  enabled: true
  prestige_level_cap: ENDLESS # ENDLESS = no prestige cap; set an integer to cap prestige levels
  level_cap_increase_per_prestige: 10
  base_xp_increase_per_prestige: 20
  # Prestige augment milestone slots by tier.
  # Each entry requires both a prestige condition and an optional player level gate (required_player_level).
  # - Use prestige_levels: [1, 2, ...] for explicit milestones.
  # - Use required_prestige_level + max_unlocks for progressive unlocks (one slot per prestige, up to max_unlocks; -1 = unlimited).
  augment_unlock_tiers:
    - tier: COMMON
      prestige_levels: ["*"] # one COMMON slot every prestige level
      required_player_level: 1 # grant prestige COMMON slot immediately at level 1
    - tier: ELITE
      prestige_levels: [1, 4, 7, 10]
      required_player_level: 15
    - tier: LEGENDARY
      prestige_levels: [10]
      required_player_level: 30
    - tier: MYTHIC
      prestige_levels: [15]
      required_player_level: 50

  # Prestige reroll milestone grants by tier.
  augment_reroll_tiers:
    - tier: ELITE
      prestige_levels: [3, 7, 11]
    - tier: LEGENDARY
      prestige_levels: [4, 10, 14]
    - tier: MYTHIC
      prestige_levels: [5, 15]

Mob_Leveling:
  Level_Source:
    # Fallback/default mode. world-settings/ World_Overrides.<world>.Level_Source.Mode wins when present.
    Mode: FIXED # PLAYER, MIXED, DISTANCE, FIXED, or TIERS
    Party_System:
      Enabled: true
      Level_Calculation: "MEDIAN"
      Dominant_Party_Resolution:
        Mode: "MOST_MEMBERS"
      Max_Internal_Level_Gap: 999
  Experience:
    Enabled: true
    Scaling:
      Mode: LINEAR
      BonusAtMax: 3.0
      MinMultiplier: 0.2
    XP_Level_Range:
      Enabled: true
      Max_Difference: 20
      Below_Range:
        Multiplier: 0.05
      Above_Range:
        Multiplier: 0.05
    Additive_Minimum_XP: 50
    Global_XP_Multiplier: 1.0
  Nameplate:
    # Enables or disables mob leveling nameplates completely.
    Enabled: true
    Show_Level: true
    Show_Name: true
    Show_Health: true
    # Nameplate HP refresh cadence. The system fires every ~100ms; each tick = 50ms (20 TPS).
    # - 1:  every system cycle (~100ms, smoothest)
    # - 3:  ~150ms (recommended)
    # - 5:  ~250ms
    # - 10: ~500ms
    Nameplate_Update_Ticks: 10

# Player nameplate controls are separate from mob nameplate controls.
Player_Nameplate:
  # Enables or disables EndlessLeveling player nameplate augmentation completely.
  # When disabled, EL removes its level/prestige/race/class/nameplate segments and leaves the base player name only.
  Enabled: true
  # Player nameplates are event-driven and refresh only when relevant player data changes (level, prestige, race, class, profile change).

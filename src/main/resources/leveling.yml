# This is the leveling formula for the server. It is used to calculate the amount of experience required to level up.
default:
  expression: "base * ((log(level)+1) * (sqrt(level)))^1.75"
  base: 50

# If you change these values, make sure to reset everyone to sync the skill points by do "/skills resetskillpointsall"
baseSkillPoints: 12
skillPointsPerLevel: 6

player_level_cap: 100

# =====================================================
# MOB LEVELING CONFIG
# =====================================================

Mob_Leveling:
  Enabled: true

  # Mobs listed here will NEVER be leveled
  Blacklist_Mob_Types:
    # Aquatic passives
    - "Bluegill"
    - "Clownfish"
    - "Eel_Moray"
    - "Frostgill"
    - "Jellyfish_Blue"
    - "Jellyfish_Cyan"
    - "Jellyfish_Green"
    - "Jellyfish_Man_Of_War"
    - "Jellyfish_Red"
    - "Jellyfish_Yellow"
    - "Minnow"
    - "Pike"
    - "Piranha"
    - "Piranha_Black"
    - "Pufferfish"
    - "Salmon"
    - "Shark_Hammerhead"
    - "Shellfish_Lava"
    - "Snapjaw"
    - "Tang_Blue"
    - "Tang_Chevron"
    - "Tang_Lemon_Peel"
    - "Tang_Sailfin"
    - "Trilobite"
    - "Trilobite_Black"
    - "Trout_Rainbow"
    - "Whale_Humpback"

    # Avian passives
    - "Archaeopteryx"
    - "Bluebird"
    - "Crow"
    - "Duck"
    - "Finch_Green"
    - "Hawk"
    - "Owl_Brown"
    - "Owl_Snow"
    - "Parrot"
    - "Pigeon"
    - "Pterodactyl"
    - "Raven"
    - "Sparrow"
    - "Vulture"
    - "Woodpecker"

    # Critter passives
    - "Frog_Blue"
    - "Frog_Green"
    - "Frog_Orange"
    - "Gecko"
    - "Meerkat"
    - "Mouse"
    - "Squirrel"
    - "Sheep"
    - "Rabbit"
    - "Rabbit_Arctic"
    - "Rabbit_Brown"
    - "Rabbit_Spotted"
    - "Rabbit_White"
    - "Rabbit_Black"

  # -------------------------------------------------
  # GLOBAL MOB LEVEL RANGE
  # -------------------------------------------------
  Level_Range:
    Min: 1
    Max: 100

  # -------------------------------------------------
  # HOW MOB LEVELS ARE ASSIGNED
  # -------------------------------------------------
  Level_Source:
    # DISTANCE | PLAYER | FIXED
    Mode: "DISTANCE"

    # Mob level is based on distance from spawn / world center
    Distance_Level:
      Start_Level: 1
      Blocks_Per_Level: 100
      Max_Level: 100
      Min_Level: 1

    # Mob level is based on the player's level
    Player_Based:
      Offset: 0 # Mob level = player level + offset
      Min_Difference: -5 # Mobs can be 5 levels lower
      Max_Difference: 5 # Mobs can be 5 levels higher

    # Used when Mode is FIXED
    Fixed_Level:
      Level: 10

  # -------------------------------------------------
  # MOB STAT SCALING
  # -------------------------------------------------
  Scaling:
    Health:
      Enabled: true
      Base_Multiplier: 1.0
      Per_Level: 0.05 # +5% HP per mob level

    Damage:
      Enabled: true
      Base_Multiplier: 1.0
      Per_Level: 0.02 # optional suggestion (2% per level)

  # -------------------------------------------------
  # EXPERIENCE & ANTI-EXPLOIT RULES
  # -------------------------------------------------
  Experience:
    Enabled: true

    # Controls when XP is awarded based on level difference
    XP_Level_Range:
      Enabled: true

      # No XP if the player is this many levels
      # above OR below the mob
      Max_Difference: 10

      # Hard cutoffs
      Below_Range:
        Multiplier: 0.0 # Player too weak → no XP

      Above_Range:
        Multiplier: 0.0 # Player too strong → no XP

    # Optional global XP multiplier
    Global_XP_Multiplier: 1.0

  # -------------------------------------------------
  # VISUALS & PLAYER FEEDBACK
  # -------------------------------------------------
  UI:
    Show_Mob_Level: true

# DON'T EDIT THIS LINE BELOW
config_version: 2
